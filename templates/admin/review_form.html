{% extends "admin/layout.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">{% if review %}Редактировать отзыв{% else %}Новый отзыв{% endif %}</h1>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Имя клиента</label>
                        <input type="text" name="client_name" class="form-control" required value="{{ review.client_name if review else '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Фото клиента (аватар)</label>
                        {% if review and review.avatar_url %}
                        <div class="mb-2">
                            <img src="{{ review.avatar_url }}" alt="" class="rounded-circle" style="width: 64px; height: 64px;">
                        </div>
                        {% endif %}
                        <input type="file" name="avatar" class="form-control" accept="image/*">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Оценка</label>
                        <select name="rating" class="form-select">
                            {% for i in range(5, 0, -1) %}
                            <option value="{{ i }}" {% if review and review.rating == i %}selected{% endif %}>{{ i }} звезд</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Текст отзыва</label>
                        <textarea name="text" class="form-control" rows="4" required>{{ review.text if review else '' }}</textarea>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_published" name="is_published" {% if not review or review.is_published %}checked{% endif %}>
                        <label class="form-check-label" for="is_published">Опубликовать на сайте</label>
                    </div>

                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{{ url_for('admin_reviews') }}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
