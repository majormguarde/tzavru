{% extends 'admin/layout.html' %}

{% block title %}Настройки сайта{% endblock %}
{% block page_title %}Настройки сайта{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <!-- Main Info -->
                <div class="col-md-6 mb-4">
                    <h5 class="card-title mb-3">Основная информация</h5>
                    
                    <div class="mb-3">
                        <label class="form-label">Название сайта</label>
                        <input type="text" name="site_name" class="form-control" value="{{ settings.site_name or '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Слоган (под названием в футере)</label>
                        <textarea name="slogan" class="form-control" rows="2">{{ settings.slogan or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Логотип</label>
                        {% if settings.logo_url %}
                            <div class="mb-2">
                                <img src="{{ settings.logo_url }}" alt="Logo" style="max-height: 50px;">
                            </div>
                        {% endif %}
                        <input type="file" name="logo" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Основной телефон</label>
                        <input type="text" name="phone_main" class="form-control" value="{{ settings.phone_main or '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Дополнительный телефон</label>
                        <input type="text" name="phone_secondary" class="form-control" value="{{ settings.phone_secondary or '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email для связи</label>
                        <input type="email" name="email_info" class="form-control" value="{{ settings.email_info or '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Адрес</label>
                        <input type="text" name="address" class="form-control" value="{{ settings.address or '' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ссылка на карту (геометка)</label>
                        <input type="text" name="map_url" class="form-control" value="{{ settings.map_url or '' }}" placeholder="https://yandex.ru/maps/...">
                    </div>
                </div>

                <!-- Social Links -->
                <div class="col-md-6 mb-4">
                    <h5 class="card-title mb-3">Социальные сети</h5>
                    
                    <div class="mb-3">
                        <label class="form-label">VK</label>
                        <input type="text" name="social_vk" class="form-control" value="{{ settings.social_vk or '' }}" placeholder="https://vk.com/...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telegram</label>
                        <input type="text" name="social_telegram" class="form-control" value="{{ settings.social_telegram or '' }}" placeholder="https://t.me/...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">WhatsApp</label>
                        <input type="text" name="social_whatsapp" class="form-control" value="{{ settings.social_whatsapp or '' }}" placeholder="https://wa.me/...">
                    </div>
                </div>

                <!-- SMTP Settings -->
                <div class="col-12 mt-3">
                    <h5 class="card-title mb-3">Настройки почтового сервера (SMTP)</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">SMTP Сервер</label>
                            <input type="text" name="smtp_server" class="form-control" value="{{ settings.smtp_server or '' }}">
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">Порт</label>
                            <input type="number" name="smtp_port" class="form-control" value="{{ settings.smtp_port or 587 }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Имя пользователя</label>
                            <input type="text" name="smtp_username" class="form-control" value="{{ settings.smtp_username or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="smtp_password" class="form-control" value="{{ settings.smtp_password or '' }}">
                        </div>
                        <div class="col-md-4 mb-3 d-flex align-items-end">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" name="smtp_use_tls" id="smtp_use_tls" {% if settings.smtp_use_tls %}checked{% endif %}>
                                <label class="form-check-label" for="smtp_use_tls">
                                    Использовать TLS
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-2"></i>Сохранить настройки
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
